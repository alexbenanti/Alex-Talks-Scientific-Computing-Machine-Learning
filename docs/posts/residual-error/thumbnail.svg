<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Residual versus error</title>
  <desc id="desc">A mathematical diagram showing a small residual and a fixed error.</desc>
  <rect width="1200" height="630" fill="#f4f1ea"/>
  <path d="M90 525 H1110 M145 565 V75" stroke="#18212f" stroke-width="6"/>
  <path d="M185 470 C340 400 520 315 690 230 C850 150 990 105 1080 90" fill="none" stroke="#235789" stroke-width="12"/>
  <path d="M185 170 H1080" fill="none" stroke="#9b3d31" stroke-width="12" stroke-dasharray="25 18"/>
  <text x="705" y="275" font-family="system-ui, sans-serif" font-size="54" fill="#235789">residual → 0</text>
  <text x="705" y="145" font-family="system-ui, sans-serif" font-size="54" fill="#9b3d31">error = 1</text>
  <text x="90" y="65" font-family="Georgia, serif" font-size="64" font-weight="700" fill="#18212f">Small residual ≠ small error</text>
  <text x="950" y="590" font-family="Georgia, serif" font-size="42" fill="#18212f">ε</text>
</svg>
